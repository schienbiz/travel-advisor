<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Advisor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #07070d;
      --surface:    #0d0d18;
      --surface2:   #12121f;
      --surface3:   #17172a;
      --border:     #1e1e32;
      --border2:    #2a2a42;
      --accent:     #6366f1;
      --accent2:    #818cf8;
      --accent-dim: rgba(99,102,241,0.12);
      --green:      #22c55e;
      --green-dim:  rgba(34,197,94,0.1);
      --orange:     #f97316;
      --red:        #ef4444;
      --gold:       #f59e0b;
      --text:       #f0f0fa;
      --text2:      #8b8ba8;
      --text3:      #44445e;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-winner: 0 0 0 1px rgba(99,102,241,0.35), 0 12px 40px rgba(99,102,241,0.18);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 35% at 50% -5%, rgba(99,102,241,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 40% 20% at 80% 10%, rgba(129,140,248,0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 16px 96px;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 36px; }
    .header-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.4rem; margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }
    .header h1 { font-size: 1.85rem; font-weight: 800; letter-spacing: -0.04em; color: #fff; margin-bottom: 6px; }
    .header p { font-size: 0.875rem; color: var(--text3); letter-spacing: 0.01em; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px;
      width: 100%; max-width: 580px;
      box-shadow: var(--shadow-card);
    }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    label {
      font-size: 0.68rem; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text); font-size: 0.95rem;
      padding: 11px 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none; width: 100%; min-height: 44px;
      font-family: inherit;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    input::placeholder { color: var(--text3); }
    select option { background: var(--surface2); }

    /* ── Route row ── */
    .route-row { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 8px; align-items: end; margin-bottom: 14px; }
    .swap-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 50%; color: var(--text3); cursor: pointer;
      width: 36px; height: 36px; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; transition: all 0.2s; padding: 0; margin-bottom: 2px;
    }
    .swap-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(180deg); opacity: 1; }
    .iata-input { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }

    .row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; margin-top: 8px; padding: 15px;
      background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
      color: #fff; border: none; border-radius: 13px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      min-height: 50px; letter-spacing: -0.01em;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }
    .btn-primary:hover { opacity: 0.92; box-shadow: 0 6px 28px rgba(99,102,241,0.45); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.45; cursor: default; transform: none; box-shadow: none; }

    .btn-parse {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 11px; color: var(--text2);
      font-size: 0.85rem; font-weight: 500; cursor: pointer;
      padding: 10px 16px; min-height: 44px; white-space: nowrap;
      transition: all 0.15s;
    }
    .btn-parse:hover { border-color: var(--border2); color: var(--text); opacity: 1; }
    .btn-parse:disabled { opacity: 0.4; cursor: default; }

    /* ── NL ── */
    .nl-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .nl-divider {
      text-align: center; font-size: 0.68rem; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin: 10px 0 18px; position: relative;
    }
    .nl-divider::before, .nl-divider::after {
      content: ""; position: absolute; top: 50%;
      width: 42%; height: 1px; background: var(--border);
    }
    .nl-divider::before { left: 0; } .nl-divider::after { right: 0; }

    /* ── Prefs ── */
    .prefs-details { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
    .prefs-details > summary {
      font-size: 0.8rem; color: var(--text3); cursor: pointer;
      list-style: none; display: flex; align-items: center; gap: 6px; user-select: none;
    }
    .prefs-details > summary::-webkit-details-marker { display: none; }
    .prefs-details > summary::after { content: "›"; font-size: 1rem; line-height: 1; transition: transform 0.2s; }
    .prefs-details[open] > summary::after { content: "‹"; }
    .prefs-body { margin-top: 14px; display: flex; flex-direction: column; gap: 12px; }
    .prefs-row { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: center; }
    .toggle-wrap {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      font-size: 0.85rem; color: var(--text2); white-space: nowrap; padding: 4px 0;
    }
    .toggle-wrap input[type=checkbox] { width: 16px; height: 16px; min-height: 0; accent-color: var(--accent); cursor: pointer; }

    /* ── History ── */
    #historySection { width: 100%; max-width: 580px; margin-top: 14px; display: none; }
    .history-label { font-size: 0.68rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .history-chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .history-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text3); font-size: 0.78rem;
      padding: 6px 14px; cursor: pointer; transition: all 0.15s;
      min-height: 0; width: auto; margin: 0; font-weight: 400;
    }
    .history-chip:hover { border-color: var(--accent); color: var(--text2); opacity: 1; }
    .history-clear {
      background: none; border: none; color: var(--text3); font-size: 0.72rem;
      cursor: pointer; padding: 4px; min-height: 0; width: auto; margin: 0;
    }
    .history-clear:hover { color: var(--text2); opacity: 1; }

    /* ── Results ── */
    .result-section { width: 100%; max-width: 920px; margin-top: 32px; }
    .results-grid { display: grid; grid-template-columns: 1fr 310px; gap: 14px; align-items: start; }

    .section-hdr {
      font-size: 0.68rem; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .section-hdr-badge {
      background: var(--surface3); border: 1px solid var(--border);
      color: var(--text3); font-size: 0.65rem; font-weight: 600;
      padding: 2px 8px; border-radius: 20px; letter-spacing: 0.05em;
    }

    /* ── Flight cards ── */
    .flight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .flight-card:last-child { margin-bottom: 0; }
    .flight-card:not(.winner):hover {
      transform: translateY(-1px);
      border-color: var(--border2);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    .flight-card.winner {
      background: linear-gradient(140deg, #0f0f24 0%, #10102a 60%, #0d0d20 100%);
      border-color: rgba(99,102,241,0.45);
      box-shadow: var(--shadow-winner);
    }
    .flight-card.winner::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      border-radius: 18px 18px 0 0;
    }

    /* stagger animation */
    .flight-card { opacity: 0; animation: cardIn 0.3s ease forwards; }
    .flight-card:nth-child(1) { animation-delay: 0.05s; }
    .flight-card:nth-child(2) { animation-delay: 0.10s; }
    .flight-card:nth-child(3) { animation-delay: 0.15s; }
    .flight-card:nth-child(4) { animation-delay: 0.20s; }
    .flight-card:nth-child(5) { animation-delay: 0.25s; }
    .flight-card:nth-child(6) { animation-delay: 0.30s; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    .fc-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .airline-badge {
      width: 38px; height: 38px; border-radius: 11px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; color: rgba(255,255,255,0.7);
      letter-spacing: 0.05em; flex-shrink: 0; margin-top: 1px;
    }
    .fc-carrier-block { flex: 1; }
    .fc-carrier { font-size: 0.95rem; font-weight: 700; color: var(--text); line-height: 1.2; }
    .fc-flightno { font-size: 0.72rem; color: var(--text3); margin-top: 2px; }
    .fc-price-block { text-align: right; flex-shrink: 0; }
    .fc-price { font-size: 1.4rem; font-weight: 800; color: #fff; letter-spacing: -0.03em; line-height: 1; }
    .winner-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff; font-size: 0.62rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 3px 9px; border-radius: 20px; margin-top: 6px;
      box-shadow: 0 2px 10px rgba(99,102,241,0.4);
    }

    /* Route bar */
    .fc-route {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .fc-time-block { flex-shrink: 0; min-width: 44px; }
    .fc-time { font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1; }
    .fc-time-block.right { text-align: right; }
    .fc-time-next { font-size: 0.62rem; color: var(--orange); font-weight: 600; vertical-align: super; margin-left: 2px; }
    .fc-route-mid {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .fc-duration { font-size: 0.72rem; font-weight: 600; color: var(--text2); letter-spacing: 0.02em; }
    .fc-bar { width: 100%; display: flex; align-items: center; position: relative; }
    .fc-bar-line {
      flex: 1; height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      border-radius: 2px;
    }
    .fc-bar-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.15); flex-shrink: 0;
    }
    .fc-bar-stop {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--orange); flex-shrink: 0;
      box-shadow: 0 0 8px rgba(249,115,22,0.6);
    }
    .fc-bar-plane { font-size: 0.65rem; color: rgba(255,255,255,0.2); flex-shrink: 0; }

    /* Tags */
    .fc-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.72rem; font-weight: 600;
      padding: 4px 10px; border-radius: 8px;
    }
    .tag-green  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.18); }
    .tag-orange { background: rgba(249,115,22,0.1); color: var(--orange); border: 1px solid rgba(249,115,22,0.2); }
    .tag-red    { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.18); }
    .tag-direct { background: rgba(34,197,94,0.07); color: var(--green); border: 1px solid rgba(34,197,94,0.18); }

    /* Reason */
    .fc-reason {
      font-size: 0.8rem; color: var(--text2); line-height: 1.6;
      padding: 10px 13px; background: rgba(0,0,0,0.3);
      border-radius: 10px; margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.04);
    }

    /* Book links */
    .fc-book { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.05); }
    .btn-book {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff; border-radius: 10px; font-size: 0.82rem; font-weight: 700;
      text-decoration: none; transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 14px rgba(99,102,241,0.3);
    }
    .btn-book:hover { opacity: 0.88; box-shadow: 0 4px 18px rgba(99,102,241,0.4); }
    .btn-book-alt {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 14px;
      background: transparent; color: var(--text3);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.82rem; font-weight: 500;
      text-decoration: none; transition: all 0.15s;
    }
    .btn-book-alt:hover { border-color: var(--border2); color: var(--text2); }

    /* ── Right column ── */
    .right-col { display: flex; flex-direction: column; gap: 12px; }

    /* Hotel card */
    .hotel-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 20px;
      box-shadow: var(--shadow-card); max-width: 580px;
      opacity: 0; animation: cardIn 0.3s ease 0.1s forwards;
    }
    .hotel-name { font-size: 1.05rem; font-weight: 800; color: #fff; margin-bottom: 4px; line-height: 1.3; }
    .hotel-meta { font-size: 0.8rem; color: var(--text2); margin-bottom: 10px; line-height: 1.5; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .hotel-stars { color: var(--gold); letter-spacing: 0.05em; font-size: 0.78rem; }
    .hotel-rating { background: rgba(34,197,94,0.12); color: var(--green); font-size: 0.72rem; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
    .hotel-price-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 12px; }
    .hotel-price { font-size: 1.25rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .hotel-price-sub { font-size: 0.78rem; color: var(--text3); }

    .hotel-reason {
      font-size: 0.78rem; color: var(--text2); line-height: 1.6;
      margin-bottom: 14px; padding: 10px 12px;
      background: rgba(0,0,0,0.25); border-radius: 10px; border: 1px solid rgba(255,255,255,0.04);
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    .other-options-label { font-size: 0.65rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .hotel-option {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 8px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .hotel-option:last-child { border-bottom: none; padding-bottom: 0; }
    .hotel-option-name { font-size: 0.82rem; font-weight: 600; color: var(--text2); margin-bottom: 2px; }
    .hotel-option-meta { font-size: 0.72rem; color: var(--text3); display: flex; align-items: center; gap: 4px; }
    .hotel-option-price { font-size: 0.85rem; font-weight: 700; color: var(--text2); white-space: nowrap; }

    /* Trip total */
    .trip-total-card {
      background: linear-gradient(140deg, #0f0f24 0%, #0d1220 100%);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 18px; padding: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      opacity: 0; animation: cardIn 0.3s ease 0.15s forwards;
    }
    .total-label { font-size: 0.68rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .total-amount { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: -0.04em; line-height: 1; margin-bottom: 8px; }
    .total-breakdown { font-size: 0.78rem; color: var(--text3); line-height: 1.7; }
    .total-per { font-size: 0.82rem; color: var(--accent2); font-weight: 600; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(99,102,241,0.15); }

    /* ── Date strip ── */
    .date-strip-wrap { margin-bottom: 18px; }
    .date-strip-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
    .date-strip-scroll::-webkit-scrollbar { display: none; }
    .date-pill {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
      padding: 7px 10px; border-radius: 10px; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface2);
      font-size: 0.72rem; transition: all 0.15s; min-width: 54px;
    }
    .date-pill:hover { border-color: var(--accent); background: var(--surface3); }
    .date-pill.active { border-color: var(--accent); background: var(--accent-dim); }
    .date-pill.cheapest { border-color: rgba(34,197,94,0.4); background: var(--green-dim); }
    .date-pill .dp-day { color: var(--text3); font-size: 0.65rem; margin-bottom: 2px; }
    .date-pill .dp-price { color: var(--text); font-weight: 700; }
    .date-pill.cheapest .dp-price { color: var(--green); }
    .date-pill.active .dp-price { color: var(--accent2); }
    .date-strip-insight { font-size: 0.78rem; color: var(--text2); margin-top: 8px; line-height: 1.5; padding: 8px 12px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.04); }

    /* ── Price trend badge ── */
    .trend-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-left: 8px; }
    .trend-down { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .trend-up   { background: rgba(249,115,22,0.1); color: var(--orange); border: 1px solid rgba(249,115,22,0.2); }
    .trend-stable { background: var(--surface3); color: var(--text3); border: 1px solid var(--border); }

    /* ── Load more button ── */
    .btn-load-more {
      width: 100%; margin-top: 12px; padding: 12px;
      background: none; border: 1px dashed var(--border2);
      border-radius: 13px; color: var(--text3);
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s; min-height: 0;
    }
    .btn-load-more:hover { border-color: var(--accent); color: var(--accent2); opacity: 1; }
    .btn-load-more:disabled { opacity: 0.4; cursor: default; }

    /* ── Loading ── */
    .loading-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 22px; padding: 44px 32px; text-align: center;
      box-shadow: var(--shadow-card);
    }
    .loading-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
      animation: float 2.5s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .loading-steps { display: flex; flex-direction: column; gap: 14px; text-align: left; max-width: 260px; margin: 0 auto; }
    .step { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--text3); transition: color 0.3s; }
    .step.active { color: var(--text); }
    .step.done   { color: var(--text3); }
    .step-icon { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .spinner-sm {
      width: 15px; height: 15px;
      border: 2px solid rgba(99,102,241,0.2);
      border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: background 0.3s; }
    .step.active .step-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .step.done   .step-dot { background: var(--green); }

    /* ── Error ── */
    .error-msg {
      background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 14px; padding: 16px 20px; color: #fca5a5; font-size: 0.875rem;
    }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      body { padding: 28px 12px 72px; }
      .header h1 { font-size: 1.5rem; }
      .card { padding: 20px; border-radius: 18px; }
      .results-grid { grid-template-columns: 1fr; }
      .fc-price { font-size: 1.2rem; }
      .total-amount { font-size: 1.6rem; }
      .right-col { flex-direction: column; }
    }
    @media (max-width: 400px) {
      .row { grid-template-columns: 1fr 1fr; }
      .row .field:first-child { grid-column: span 2; }
    }

    /* ── Search buttons ── */
    .search-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .btn-secondary {
      width: 100%; padding: 15px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text2); border-radius: 13px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: all 0.15s; min-height: 50px; letter-spacing: -0.01em;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); background: var(--surface3); opacity: 1; }
    .btn-secondary:active { transform: scale(0.99); }
    .btn-secondary:disabled { opacity: 0.4; cursor: default; transform: none; }

    /* ── Trip type tabs ── */
    .trip-type-tabs {
      display: flex; gap: 3px; margin-bottom: 22px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 13px; padding: 4px;
    }
    .trip-tab {
      flex: 1; padding: 8px 6px; border-radius: 10px;
      background: none; border: none; color: var(--text3);
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s; min-height: 0; letter-spacing: -0.01em;
    }
    .trip-tab.active { background: var(--surface3); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.5); }
    .trip-tab:hover:not(.active) { color: var(--text2); opacity: 1; }

    /* ── Multi-city legs ── */
    .leg-row {
      display: grid; grid-template-columns: 1fr 20px 1fr 148px 30px;
      gap: 6px; align-items: end; margin-bottom: 8px;
    }
    .leg-arrow { display: flex; align-items: flex-end; justify-content: center; color: var(--text3); padding-bottom: 12px; font-size: 0.9rem; }
    .btn-remove-leg {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text3); cursor: pointer; width: 30px; height: 44px; min-height: 0;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; padding: 0;
    }
    .btn-remove-leg:hover { border-color: var(--red); color: var(--red); opacity: 1; }
    .leg-placeholder { width: 30px; }
    .btn-add-leg {
      background: none; border: 1px dashed var(--border2); border-radius: 10px;
      color: var(--text3); cursor: pointer; padding: 9px; font-size: 0.82rem; font-weight: 500;
      width: 100%; min-height: 0; margin-top: 4px; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-add-leg:hover { border-color: var(--accent); color: var(--accent2); opacity: 1; }
    @media (max-width: 520px) {
      .leg-row { grid-template-columns: 1fr 16px 1fr 120px 28px; gap: 4px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">✈</div>
    <h1>Travel Advisor</h1>
    <p>One opinionated pick — no endless scrolling.</p>
  </div>

  <div class="card">
    <div class="trip-type-tabs">
      <button class="trip-tab active" onclick="setTripType('oneway')">One-way</button>
      <button class="trip-tab" onclick="setTripType('roundtrip')">Round-trip</button>
      <button class="trip-tab" onclick="setTripType('multicity')">Multi-city</button>
    </div>

    <div class="field" style="margin-bottom:8px">
      <label>Describe your trip</label>
      <div class="nl-row">
        <input id="nlInput" type="text" placeholder="e.g. Tokyo 5 nights in July, 2 people from Taipei" style="flex:1">
        <button class="btn-parse" id="parseBtn" onclick="parseNL()">Fill ↓</button>
      </div>
    </div>
    <div class="nl-divider">or fill manually</div>

    <!-- One-way + Round-trip shared form -->
    <div id="standardForm">
      <div class="route-row">
        <div class="field" style="margin:0">
          <label>From</label>
          <input id="from" class="iata-input" type="text" placeholder="TPE" maxlength="3">
        </div>
        <button class="swap-btn" onclick="swapRoutes()" title="Swap">⇄</button>
        <div class="field" style="margin:0">
          <label>To</label>
          <input id="to" class="iata-input" type="text" placeholder="LHR" maxlength="3">
        </div>
      </div>

      <div id="onewayFields">
        <div class="row">
          <div class="field">
            <label>Departure date</label>
            <input id="date" type="date">
          </div>
          <div class="field">
            <label>Nights</label>
            <input id="nights" type="number" value="4" min="1" max="30">
          </div>
          <div class="field">
            <label>Travelers</label>
            <input id="adults" type="number" value="1" min="1" max="9">
          </div>
        </div>
      </div>

      <div id="roundtripFields" style="display:none">
        <div class="row">
          <div class="field">
            <label>Depart</label>
            <input id="rtDepart" type="date">
          </div>
          <div class="field">
            <label>Return</label>
            <input id="rtReturn" type="date">
          </div>
          <div class="field">
            <label>Travelers</label>
            <input id="rtAdults" type="number" value="1" min="1" max="9">
          </div>
        </div>
      </div>
    </div>

    <!-- Multi-city form -->
    <div id="multicityForm" style="display:none">
      <div id="legRows"></div>
      <button class="btn-add-leg" id="addLegBtn" onclick="addLeg()">+ Add leg</button>
      <div class="field" style="margin-top:14px; max-width:140px">
        <label>Travelers</label>
        <input id="mcAdults" type="number" value="1" min="1" max="9">
      </div>
    </div>

    <details class="prefs-details" id="prefsDetails">
      <summary>Preferences &amp; filters</summary>
      <div class="prefs-body">
        <div class="field" style="margin:0">
          <label>Notes</label>
          <input id="prefNotes" type="text" placeholder="e.g. prefer window seat, avoid red-eyes, EVA Air" oninput="savePrefs()">
        </div>
        <div class="prefs-row">
          <label class="toggle-wrap">
            <input type="checkbox" id="prefDirect" onchange="savePrefs()">
            <span>Direct only</span>
          </label>
          <div class="field" style="margin:0">
            <label>Hotel tier</label>
            <select id="prefHotel" onchange="savePrefs()" style="font-size:0.875rem;padding:9px 12px">
              <option value="">Any</option>
              <option value="budget">Budget</option>
              <option value="mid-range">Mid-range</option>
              <option value="premium">Premium</option>
            </select>
          </div>
        </div>
      </div>
    </details>

    <div class="search-btns">
      <button class="btn-primary" id="flightBtn" onclick="searchFlights()">✈ Search Flights</button>
      <button class="btn-secondary" id="hotelBtn" onclick="searchHotel()">🏨 Search Hotel</button>
    </div>
  </div>

  <div id="historySection">
    <div class="history-label">Recent</div>
    <div class="history-chips" id="historyChips"></div>
  </div>

  <div id="flightResult" class="result-section"></div>
  <div id="hotelResult" class="result-section" style="margin-top:14px"></div>

  <script>
    // ── Init ──
    let tripType = "oneway";
    let legIdSeq = 0;
    let _flt = null, _hlt = null;

    (function init() {
      const d = new Date(); d.setDate(d.getDate() + 30);
      const ds = d.toISOString().slice(0, 10);
      document.getElementById("date").value = ds;
      document.getElementById("rtDepart").value = ds;
      const r = new Date(d); r.setDate(r.getDate() + 7);
      document.getElementById("rtReturn").value = r.toISOString().slice(0, 10);
      addLeg(); addLeg();
      loadPrefs(); renderHistory();
    })();

    // ── Trip type ──
    function setTripType(type) {
      tripType = type;
      document.querySelectorAll(".trip-tab").forEach((t, i) => {
        t.classList.toggle("active", ["oneway","roundtrip","multicity"][i] === type);
      });
      document.getElementById("standardForm").style.display   = type === "multicity" ? "none" : "";
      document.getElementById("multicityForm").style.display  = type === "multicity" ? "" : "none";
      document.getElementById("onewayFields").style.display   = type === "roundtrip" ? "none" : "";
      document.getElementById("roundtripFields").style.display = type === "roundtrip" ? "" : "none";
      document.getElementById("hotelBtn").style.display = type === "multicity" ? "none" : "";
    }

    // ── Multi-city legs ──
    function addLeg() {
      const rows = document.getElementById("legRows");
      if (rows.children.length >= 4) return;
      const idx = legIdSeq++;
      const isFirst = rows.children.length === 0;
      const d = new Date(); d.setDate(d.getDate() + 30 + rows.children.length * 4);
      const div = document.createElement("div");
      div.className = "leg-row"; div.id = `leg-${idx}`;
      div.innerHTML = `
        <div class="field" style="margin:0">
          ${isFirst ? '<label>From</label>' : ''}
          <input class="iata-input mc-from" type="text" placeholder="TPE" maxlength="3">
        </div>
        <div class="leg-arrow">→</div>
        <div class="field" style="margin:0">
          ${isFirst ? '<label>To</label>' : ''}
          <input class="iata-input mc-to" type="text" placeholder="LHR" maxlength="3">
        </div>
        <div class="field" style="margin:0">
          ${isFirst ? '<label>Date</label>' : ''}
          <input class="mc-date" type="date" value="${d.toISOString().slice(0,10)}">
        </div>
        ${rows.children.length >= 2
          ? `<button class="btn-remove-leg" onclick="removeLeg(${idx})" title="Remove">×</button>`
          : `<div class="leg-placeholder"></div>`}`;
      rows.appendChild(div);
      div.querySelectorAll(".mc-from,.mc-to").forEach(inp => {
        inp.addEventListener("input", function() {
          const s = this.selectionStart; this.value = this.value.toUpperCase(); this.setSelectionRange(s, s);
        });
      });
      document.getElementById("addLegBtn").style.display = rows.children.length >= 4 ? "none" : "";
    }

    function removeLeg(idx) {
      const el = document.getElementById(`leg-${idx}`);
      if (el) el.remove();
      document.getElementById("addLegBtn").style.display = "";
    }

    function getLegs() {
      return Array.from(document.querySelectorAll("#legRows .leg-row")).map(row => ({
        from: row.querySelector(".mc-from").value.trim().toUpperCase(),
        to:   row.querySelector(".mc-to").value.trim().toUpperCase(),
        date: row.querySelector(".mc-date").value,
      }));
    }

    // ── Helpers ──
    function swapRoutes() {
      const f = document.getElementById("from"), t = document.getElementById("to");
      [f.value, t.value] = [t.value, f.value];
    }

    function fmtDate(dateStr) {
      if (!dateStr) return "";
      return new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function loadPrefs() {
      try {
        const p = JSON.parse(localStorage.getItem("ta-prefs") || "{}");
        if (p.notes)  document.getElementById("prefNotes").value    = p.notes;
        if (p.direct) document.getElementById("prefDirect").checked = true;
        if (p.hotel)  document.getElementById("prefHotel").value    = p.hotel;
        if (p.open)   document.getElementById("prefsDetails").open  = true;
      } catch {}
    }
    function savePrefs() {
      localStorage.setItem("ta-prefs", JSON.stringify({
        notes:  document.getElementById("prefNotes").value,
        direct: document.getElementById("prefDirect").checked,
        hotel:  document.getElementById("prefHotel").value,
        open:   document.getElementById("prefsDetails").open,
      }));
    }
    document.getElementById("prefsDetails").addEventListener("toggle", savePrefs);

    function getPrefsText() {
      const parts = [];
      const notes  = document.getElementById("prefNotes").value.trim();
      const direct = document.getElementById("prefDirect").checked;
      const hotel  = document.getElementById("prefHotel").value;
      if (notes)  parts.push(notes);
      if (direct) parts.push("direct flights only, no layovers");
      if (hotel)  parts.push(`prefers ${hotel} hotels`);
      return parts.join("; ");
    }

    // ── Price memory (per route) ──
    function routeKey(from, to) { return `ta-px-${from}-${to}`; }
    function loadPriceHistory(from, to) {
      try { return JSON.parse(localStorage.getItem(routeKey(from, to)) || "[]"); } catch { return []; }
    }
    function savePriceHistory(from, to, price_usd) {
      const key = routeKey(from, to);
      const h = loadPriceHistory(from, to);
      h.unshift({ price: price_usd, ts: Date.now() });
      localStorage.setItem(key, JSON.stringify(h.slice(0, 20)));
    }
    function timeAgo(ts) {
      const s = Math.round((Date.now() - ts) / 1000);
      if (s < 60) return "just now";
      if (s < 3600) return `${Math.round(s/60)}min ago`;
      if (s < 86400) return `${Math.round(s/3600)}h ago`;
      return `${Math.round(s/86400)}d ago`;
    }

    function getHistory() { try { return JSON.parse(localStorage.getItem("ta-history") || "[]"); } catch { return []; } }
    function saveToHistory(entry) {
      const h = getHistory().filter(e => !(e.from===entry.from && e.to===entry.to && e.date===entry.date));
      h.unshift(entry);
      localStorage.setItem("ta-history", JSON.stringify(h.slice(0, 5)));
      renderHistory();
    }
    function renderHistory() {
      const h = getHistory();
      const sec = document.getElementById("historySection");
      const chips = document.getElementById("historyChips");
      if (!h.length) { sec.style.display = "none"; return; }
      sec.style.display = "block";
      chips.innerHTML = h.map((e,i) =>
        `<button class="history-chip" onclick="restoreSearch(${i})">${esc(e.from)} → ${esc(e.to)} · ${esc(e.label)}</button>`
      ).join("") + `<button class="history-clear" onclick="clearHistory()">Clear</button>`;
    }
    function restoreSearch(idx) {
      const e = getHistory()[idx]; if (!e) return;
      setTripType("oneway");
      document.getElementById("from").value   = e.from;
      document.getElementById("to").value     = e.to;
      document.getElementById("date").value   = e.date;
      document.getElementById("nights").value = e.nights;
      document.getElementById("adults").value = e.adults;
      searchFlights();
    }
    function clearHistory() { localStorage.removeItem("ta-history"); renderHistory(); }

    async function parseNL() {
      const text = document.getElementById("nlInput").value.trim(); if (!text) return;
      const btn = document.getElementById("parseBtn");
      btn.disabled = true; btn.textContent = "…";
      try {
        const r = await fetch("/api/parse", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({text}) });
        const data = await r.json(); if (!r.ok) throw new Error(data.error);
        if (tripType === "multicity") {
          const rows = document.querySelectorAll("#legRows .leg-row");
          if (rows[0]) {
            if (data.from) rows[0].querySelector(".mc-from").value = data.from;
            if (data.to)   rows[0].querySelector(".mc-to").value   = data.to;
            if (data.date) rows[0].querySelector(".mc-date").value = data.date;
          }
          if (data.adults) document.getElementById("mcAdults").value = data.adults;
        } else if (tripType === "roundtrip") {
          if (data.from)   document.getElementById("from").value      = data.from;
          if (data.to)     document.getElementById("to").value        = data.to;
          if (data.date)   document.getElementById("rtDepart").value  = data.date;
          if (data.nights && data.date) {
            const ret = new Date(data.date); ret.setDate(ret.getDate() + data.nights);
            document.getElementById("rtReturn").value = ret.toISOString().slice(0, 10);
          }
          if (data.adults) document.getElementById("rtAdults").value  = data.adults;
        } else {
          if (data.from)   document.getElementById("from").value   = data.from;
          if (data.to)     document.getElementById("to").value     = data.to;
          if (data.date)   document.getElementById("date").value   = data.date;
          if (data.nights) document.getElementById("nights").value = data.nights;
          if (data.adults) document.getElementById("adults").value = data.adults;
        }
      } catch (err) { showFlightError("Could not parse: " + err.message); }
      finally { btn.disabled = false; btn.textContent = "Fill ↓"; }
    }

    // ── Flight search ──
    async function searchFlights() {
      let body;
      const prefs = getPrefsText();

      if (tripType === "roundtrip") {
        const from   = document.getElementById("from").value.trim().toUpperCase();
        const to     = document.getElementById("to").value.trim().toUpperCase();
        const date   = document.getElementById("rtDepart").value;
        const retD   = document.getElementById("rtReturn").value;
        const adults = parseInt(document.getElementById("rtAdults").value, 10) || 1;
        if (!from || !to || !date || !retD) { showFlightError("Fill in origin, destination, depart, and return dates."); return; }
        if (retD <= date) { showFlightError("Return date must be after departure date."); return; }
        body = { tripType: "roundtrip", from, to, date, returnDate: retD, adults, preferences: prefs };

      } else if (tripType === "multicity") {
        const legs   = getLegs();
        const adults = parseInt(document.getElementById("mcAdults").value, 10) || 1;
        if (legs.length < 2) { showFlightError("Add at least 2 legs for multi-city."); return; }
        for (const leg of legs) if (!leg.from || !leg.to || !leg.date) { showFlightError("Fill in all leg fields."); return; }
        body = { tripType: "multicity", legs, adults, preferences: prefs };

      } else {
        const from   = document.getElementById("from").value.trim().toUpperCase();
        const to     = document.getElementById("to").value.trim().toUpperCase();
        const date   = document.getElementById("date").value;
        const nights = parseInt(document.getElementById("nights").value, 10);
        const adults = parseInt(document.getElementById("adults").value, 10);
        if (!from || !to || !date) { showFlightError("Please fill in origin, destination, and date."); return; }
        body = { tripType: "oneway", from, to, date, nights, adults, preferences: prefs };
        const dep = new Date(date), ret = new Date(dep); ret.setDate(ret.getDate() + nights);
        saveToHistory({ from, to, date, nights, adults,
          label: dep.toLocaleDateString("en-US",{month:"short",day:"numeric"}) + "–" +
                 ret.toLocaleDateString("en-US",{month:"short",day:"numeric"}) });
        // attach price history for AI trend analysis
        const ph = loadPriceHistory(from, to);
        if (ph.length) body.priceHistory = ph.slice(0, 5).map(h => ({ price: h.price, ago: timeAgo(h.ts) }));
      }

      const btn = document.getElementById("flightBtn");
      btn.disabled = true; btn.textContent = "Searching…";
      showFlightLoading();
      try {
        const r = await fetch("/api/flights", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
        const data = await r.json(); if (!r.ok) throw new Error(data.error || "Unknown error");
        // save winner price to history
        if (body.tripType === "oneway" && data.winner?.price_usd)
          savePriceHistory(body.from, body.to, data.winner.price_usd);
        if (body.tripType === "oneway") _lastFlightSearch = { from: body.from, to: body.to, date: body.date, adults: body.adults, preferences: body.preferences };
        showFlightResult(data);
        // async: load date strip for one-way
        if (body.tripType === "oneway" && body.from && body.to && body.date)
          fetchDateStrip(body.from, body.to, body.date);
      } catch (err) { showFlightError(err.message); }
      finally { btn.disabled = false; btn.textContent = "✈ Search Flights"; }
    }

    // ── Hotel search ──
    async function searchHotel() {
      const prefs = getPrefsText();
      let to, date, nights, adults;

      if (tripType === "roundtrip") {
        to     = document.getElementById("to").value.trim().toUpperCase();
        date   = document.getElementById("rtDepart").value;
        const retD = document.getElementById("rtReturn").value;
        nights = Math.max(1, Math.round((new Date(retD) - new Date(date)) / 86400000));
        adults = parseInt(document.getElementById("rtAdults").value, 10) || 1;
      } else {
        to     = document.getElementById("to").value.trim().toUpperCase();
        date   = document.getElementById("date").value;
        nights = parseInt(document.getElementById("nights").value, 10) || 4;
        adults = parseInt(document.getElementById("adults").value, 10) || 1;
      }

      if (!to || !date) { showHotelError("Please fill in destination and date."); return; }

      const btn = document.getElementById("hotelBtn");
      btn.disabled = true; btn.textContent = "Searching…";
      showHotelLoading();
      try {
        const r = await fetch("/api/hotel", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ to, date, nights, adults, preferences: prefs }) });
        const data = await r.json(); if (!r.ok) throw new Error(data.error || "Unknown error");
        showHotelResultSection(data);
      } catch (err) { showHotelError(err.message); }
      finally { btn.disabled = false; btn.textContent = "🏨 Search Hotel"; }
    }

    // ── Flight loading ──
    const FLIGHT_STEPS = [
      { label: "Checking real prices",       delay: 0     },
      { label: "Generating flight options",   delay: 5000  },
      { label: "Comparing all options",       delay: 14000 },
      { label: "Picking the best flight",     delay: 22000 },
    ];
    function showFlightLoading() {
      if (_flt) clearInterval(_flt);
      document.getElementById("flightResult").innerHTML = `
        <div class="loading-wrap">
          <div class="loading-icon">✈</div>
          <div class="loading-steps">
            ${FLIGHT_STEPS.map((s,i) => `
              <div class="step" id="fs${i}">
                <span class="step-icon"><span class="step-dot"></span></span>
                <span>${s.label}</span>
              </div>`).join("")}
          </div>
        </div>`;
      const start = Date.now();
      function tick() {
        const el = Date.now() - start; let set = false;
        for (let i = FLIGHT_STEPS.length-1; i >= 0; i--) {
          const s = document.getElementById("fs"+i); if (!s) continue;
          if (el >= FLIGHT_STEPS[i].delay) {
            if (!set) { s.className="step active"; s.querySelector(".step-icon").innerHTML='<span class="spinner-sm"></span>'; set=true; }
            else      { s.className="step done";   s.querySelector(".step-icon").innerHTML='<span style="color:var(--green);font-size:0.8rem;font-weight:700">✓</span>'; }
          }
        }
      }
      tick(); _flt = setInterval(tick, 400);
    }
    function stopFlightLoading() { if (_flt) { clearInterval(_flt); _flt = null; } }
    function showFlightError(msg) { stopFlightLoading(); document.getElementById("flightResult").innerHTML = `<div class="error-msg">⚠ ${esc(msg)}</div>`; }

    // ── Hotel loading ──
    const HOTEL_STEPS = [
      { label: "Looking up hotel options",   delay: 0     },
      { label: "Comparing hotels",           delay: 8000  },
      { label: "Picking the best stay",      delay: 16000 },
    ];
    function showHotelLoading() {
      if (_hlt) clearInterval(_hlt);
      document.getElementById("hotelResult").innerHTML = `
        <div class="loading-wrap">
          <div class="loading-icon">🏨</div>
          <div class="loading-steps">
            ${HOTEL_STEPS.map((s,i) => `
              <div class="step" id="hs${i}">
                <span class="step-icon"><span class="step-dot"></span></span>
                <span>${s.label}</span>
              </div>`).join("")}
          </div>
        </div>`;
      const start = Date.now();
      function tick() {
        const el = Date.now() - start; let set = false;
        for (let i = HOTEL_STEPS.length-1; i >= 0; i--) {
          const s = document.getElementById("hs"+i); if (!s) continue;
          if (el >= HOTEL_STEPS[i].delay) {
            if (!set) { s.className="step active"; s.querySelector(".step-icon").innerHTML='<span class="spinner-sm"></span>'; set=true; }
            else      { s.className="step done";   s.querySelector(".step-icon").innerHTML='<span style="color:var(--green);font-size:0.8rem;font-weight:700">✓</span>'; }
          }
        }
      }
      tick(); _hlt = setInterval(tick, 400);
    }
    function stopHotelLoading() { if (_hlt) { clearInterval(_hlt); _hlt = null; } }
    function showHotelError(msg) { stopHotelLoading(); document.getElementById("hotelResult").innerHTML = `<div class="error-msg">⚠ ${esc(msg)}</div>`; }

    function airlineCode(flight, carrier) {
      if (flight && /^[A-Z0-9]{2}/.test(flight)) return flight.slice(0, 2);
      return carrier ? carrier.slice(0, 2).toUpperCase() : "??";
    }

    function routeBar(stops) {
      if (stops === 0) {
        return `<div class="fc-bar">
          <span class="fc-bar-dot"></span>
          <span class="fc-bar-line"></span>
          <span class="fc-bar-plane">✈</span>
          <span class="fc-bar-line"></span>
          <span class="fc-bar-dot"></span>
        </div>`;
      }
      let inner = `<span class="fc-bar-dot"></span>`;
      for (let i = 0; i < stops; i++) {
        inner += `<span class="fc-bar-line"></span><span class="fc-bar-stop"></span>`;
      }
      inner += `<span class="fc-bar-line"></span><span class="fc-bar-dot"></span>`;
      return `<div class="fc-bar">${inner}</div>`;
    }

    function layoverTags(flight) {
      if (!flight.layovers?.length) return `<span class="tag tag-direct">✓ Direct</span>`;
      return flight.layovers.map(l => {
        const m = l.durationMinutes ?? 999;
        const cls = m < 60 ? "tag-red" : m < 120 ? "tag-orange" : "tag-green";
        const warn = m < 120 ? " ⚠" : "";
        return `<span class="tag ${cls}">via ${esc(l.city || l.airport)} · ${esc(l.duration)}${warn}</span>`;
      }).join("");
    }

    // detect +1 day arrival (very rough: if arrives HH:MM is numerically < departs)
    function nextDayMark(departs, arrives) {
      if (!departs || !arrives) return "";
      const [dh] = departs.split(":").map(Number);
      const [ah] = arrives.split(":").map(Number);
      return ah < dh ? `<sup class="fc-time-next">+1</sup>` : "";
    }

    // ── Shared flight card renderer ──
    function renderFlightCards(flights, winner, reason, fromVal, toVal, dateStr) {
      const winnerIdx = flights.findIndex(f => f.flight===winner?.flight && f.carrier===winner?.carrier);
      const sorted = [...flights];
      if (winnerIdx >= 0) { const [w] = sorted.splice(winnerIdx, 1); sorted.unshift(w); }
      return sorted.map(f => {
        const isWinner = f.flight===winner?.flight && f.carrier===winner?.carrier;
        const code = airlineCode(f.flight, f.carrier);
        const bookLinks = isWinner ? `
          <div class="fc-book">
            <a class="btn-book" href="${esc(f.aviasales_url || f.booking_url)}" target="_blank" rel="noopener">Book on Aviasales →</a>
            <a class="btn-book-alt" href="https://www.google.com/flights?q=flights+from+${encodeURIComponent(fromVal)}+to+${encodeURIComponent(toVal)}+on+${encodeURIComponent(dateStr)}" target="_blank" rel="noopener">Google Flights ↗</a>
          </div>` : "";
        const reasonHtml = isWinner && reason ? `<div class="fc-reason">${esc(reason)}</div>` : "";
        return `
        <div class="flight-card ${isWinner ? "winner" : ""}">
          <div class="fc-top">
            <div class="airline-badge">${esc(code)}</div>
            <div class="fc-carrier-block">
              <div class="fc-carrier">${esc(f.carrier)}</div>
              <div class="fc-flightno">${esc(f.flight || "")}</div>
            </div>
            <div class="fc-price-block">
              <div class="fc-price">$${f.price_usd}</div>
              ${isWinner ? `<div style="text-align:right"><span class="winner-badge">★ Best pick</span></div>` : ""}
            </div>
          </div>
          <div class="fc-route">
            <div class="fc-time-block"><div class="fc-time">${esc(f.departs||"—")}</div></div>
            <div class="fc-route-mid">
              <div class="fc-duration">${esc(f.duration)}</div>
              ${routeBar(f.stops ?? 0)}
            </div>
            <div class="fc-time-block right">
              <div class="fc-time">${esc(f.arrives||"—")}${nextDayMark(f.departs, f.arrives)}</div>
            </div>
          </div>
          <div class="fc-tags">${layoverTags(f)}</div>
          ${reasonHtml}${bookLinks}
        </div>`;
      }).join("");
    }

    // ── Hotel card renderer ──
    function renderHotelCard(hotel, nightCount) {
      const others = hotel.hotels.filter(h => h.name !== hotel.winner.name);
      const otherRows = others.map(h => `
        <div class="hotel-option">
          <div>
            <div class="hotel-option-name">${esc(h.name)}</div>
            <div class="hotel-option-meta">
              <span class="hotel-stars">${"★".repeat(h.stars||0)}</span>
              <span class="hotel-rating">${h.rating}</span>
              <span>${esc(h.area)}</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <div class="hotel-option-price">$${h.price_per_night_usd}<span style="font-size:0.7rem;font-weight:400;color:var(--text3)">/nt</span></div>
            <a href="${esc(h.booking_url)}" target="_blank" rel="noopener" style="font-size:0.7rem;color:var(--accent2);text-decoration:none">Book →</a>
          </div>
        </div>`).join("");
      return `
        <div class="hotel-card">
          <div class="section-hdr">Hotel · ${esc(hotel.city)} <span class="section-hdr-badge">${nightCount} nights</span></div>
          <div class="hotel-name">${esc(hotel.winner.name)}</div>
          <div class="hotel-meta">
            <span class="hotel-stars">${"★".repeat(hotel.winner.stars||0)}</span>
            <span class="hotel-rating">${hotel.winner.rating}</span>
            <span>${esc(hotel.winner.area)}</span>
          </div>
          <div class="hotel-price-row">
            <div class="hotel-price">$${hotel.winner.price_per_night_usd}</div>
            <div class="hotel-price-sub">/night · $${hotel.winner.price_per_night_usd * nightCount} total</div>
          </div>
          <div class="hotel-reason">${esc(hotel.reason)}</div>
          <a class="btn-book" href="${esc(hotel.winner.booking_url)}" target="_blank" rel="noopener" style="display:inline-flex;text-decoration:none">Book →</a>
          ${otherRows.length ? `<div class="divider"></div><div class="other-options-label">Other options</div>${otherRows}` : ""}
        </div>`;
    }

    // ── Flight result dispatcher ──
    function showFlightResult(data) {
      stopFlightLoading();
      if (data.tripType === "roundtrip")      showRoundTripResult(data);
      else if (data.tripType === "multicity") showMultiCityResult(data);
      else                                    showOneWayResult(data);
    }

    function showHotelResultSection(data) {
      stopHotelLoading();
      document.getElementById("hotelResult").innerHTML = renderHotelCard(data, data.nights);
    }

    function showOneWayResult({ flights, winner, reason, datesLabel, trend }) {
      const fromVal = document.getElementById("from").value.toUpperCase();
      const toVal   = document.getElementById("to").value.toUpperCase();
      const dateVal = document.getElementById("date").value;
      const cards   = renderFlightCards(flights, winner, reason, fromVal, toVal, dateVal);
      const trendBadge = trend ? renderTrendBadge(trend) : "";
      document.getElementById("flightResult").innerHTML = `
        <div class="section-hdr">Flights · ${esc(datesLabel)} <span class="section-hdr-badge">${flights.length} options</span>${trendBadge}</div>
        <div id="dateStripSlot"></div>
        <div id="flightCards">${cards}</div>
        <button class="btn-load-more" id="loadMoreBtn" onclick="loadMoreFlights()">Show more options →</button>`;
    }

    function showRoundTripResult({ outbound, return: ret }) {
      const fromVal  = document.getElementById("from").value.toUpperCase();
      const toVal    = document.getElementById("to").value.toUpperCase();
      const departD  = document.getElementById("rtDepart").value;
      const returnD  = document.getElementById("rtReturn").value;
      const outCards = renderFlightCards(outbound.flights, outbound.winner, outbound.reason, fromVal, toVal, departD);
      const retCards = renderFlightCards(ret.flights, ret.winner, ret.reason, toVal, fromVal, returnD);
      document.getElementById("flightResult").innerHTML = `
        <div class="section-hdr">Outbound · ${esc(fromVal)}→${esc(toVal)} · ${esc(fmtDate(departD))} <span class="section-hdr-badge">${outbound.flights.length} options</span></div>
        ${outCards}
        <div class="section-hdr" style="margin-top:24px">Return · ${esc(toVal)}→${esc(fromVal)} · ${esc(fmtDate(returnD))} <span class="section-hdr-badge">${ret.flights.length} options</span></div>
        ${retCards}`;
    }

    function showMultiCityResult({ legs }) {
      const legsHtml = legs.map((leg, i) => {
        const cards = renderFlightCards(leg.flights, leg.winner, leg.reason, leg.from, leg.to, leg.date);
        return `
          <div class="section-hdr" ${i > 0 ? 'style="margin-top:24px"' : ''}>
            Leg ${i+1} · ${esc(leg.from)}→${esc(leg.to)} · ${esc(fmtDate(leg.date))}
            <span class="section-hdr-badge">${leg.flights.length} options</span>
          </div>
          ${cards}`;
      }).join("");
      document.getElementById("flightResult").innerHTML = legsHtml;
    }

    // ── Trend badge ──
    function renderTrendBadge(trend) {
      if (!trend?.direction || !trend?.message) return "";
      const cls = trend.direction === "down" ? "trend-down" : trend.direction === "up" ? "trend-up" : "trend-stable";
      const icon = trend.direction === "down" ? "↓" : trend.direction === "up" ? "↑" : "→";
      return `<span class="trend-badge ${cls}" title="${esc(trend.message)}">${icon} ${esc(trend.message)}</span>`;
    }

    // ── Date strip ──
    let _dateStripSearch = null;

    async function fetchDateStrip(from, to, date) {
      _dateStripSearch = { from, to, date };
      const slot = document.getElementById("dateStripSlot");
      if (!slot) return;
      try {
        const r = await fetch(`/api/calendar?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&date=${encodeURIComponent(date)}`);
        const data = await r.json();
        if (!data.dates?.length) return;
        if (document.getElementById("dateStripSlot") !== slot) return; // result replaced
        slot.innerHTML = renderDateStrip(data.dates, date, from, to);
      } catch { /* silently skip */ }
    }

    function renderDateStrip(dates, activeDate, from, to) {
      if (!dates.length) return "";
      const minPrice = Math.min(...dates.map(d => d.price_usd));
      const pills = dates.map(d => {
        const isActive = d.depart_date === activeDate;
        const isCheapest = d.price_usd === minPrice && !isActive;
        const cls = isActive ? "active" : isCheapest ? "cheapest" : "";
        const label = new Date(d.depart_date + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
        return `<button class="date-pill ${cls}" onclick="reDateSearch('${esc(from)}','${esc(to)}','${esc(d.depart_date)}')" title="${esc(d.depart_date)}">
          <span class="dp-day">${esc(label)}</span>
          <span class="dp-price">$${d.price_usd}</span>
        </button>`;
      }).join("");

      // Find cheapest date insight
      const cheapest = dates.find(d => d.price_usd === minPrice);
      const activeDateEntry = dates.find(d => d.depart_date === activeDate);
      let saving = null;
      if (cheapest && cheapest.depart_date !== activeDate) {
        const cheapLabel = new Date(cheapest.depart_date + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
        const daysDiff = Math.round(Math.abs((new Date(cheapest.depart_date) - new Date(activeDate)) / 86400000));
        const direction = new Date(cheapest.depart_date) < new Date(activeDate) ? "earlier" : "later";
        if (activeDateEntry?.price_usd != null) {
          const savingsAmt = activeDateEntry.price_usd - minPrice;
          saving = `$${activeDateEntry.price_usd} on your date vs $${minPrice} on ${cheapLabel} — fly ${daysDiff} day${daysDiff === 1 ? "" : "s"} ${direction} and save $${savingsAmt}.`;
        } else {
          saving = `Cheapest nearby: ${cheapLabel} at $${minPrice} — ${daysDiff} day${daysDiff === 1 ? "" : "s"} ${direction}.`;
        }
      }

      return `<div class="date-strip-wrap">
        <div class="date-strip-scroll">${pills}</div>
        ${saving ? `<div class="date-strip-insight">📅 ${esc(saving)}</div>` : ""}
      </div>`;
    }

    function reDateSearch(from, to, date) {
      setTripType("oneway");
      document.getElementById("from").value = from;
      document.getElementById("to").value = to;
      document.getElementById("date").value = date;
      searchFlights();
    }

    // ── Load more flights ──
    let _lastFlightSearch = null;

    async function loadMoreFlights() {
      if (!_lastFlightSearch) return;
      const btn = document.getElementById("loadMoreBtn");
      if (btn) { btn.disabled = true; btn.textContent = "Loading more…"; }

      const existingCarriers = Array.from(document.querySelectorAll("#flightCards .fc-carrier"))
        .map(el => el.textContent.trim()).filter(Boolean);

      try {
        const r = await fetch("/api/flights/more", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ..._lastFlightSearch, existing: existingCarriers }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        const more = renderFlightCards(data.flights, null, null, _lastFlightSearch.from, _lastFlightSearch.to, _lastFlightSearch.date);
        const container = document.getElementById("flightCards");
        if (container) container.insertAdjacentHTML("beforeend", more);
        if (btn) btn.remove();
      } catch (err) {
        if (btn) { btn.disabled = false; btn.textContent = "Show more options →"; }
      }
    }

    function esc(s) {
      return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    document.getElementById("nlInput").addEventListener("keydown", e => { if (e.key==="Enter") parseNL(); });
    document.addEventListener("keydown", e => {
      if (e.key==="Enter" && !["nlInput","prefNotes"].includes(document.activeElement?.id)) searchFlights();
    });
    ["from","to"].forEach(id => {
      document.getElementById(id).addEventListener("input", function() {
        const s = this.selectionStart;
        this.value = this.value.toUpperCase();
        this.setSelectionRange(s, s);
      });
    });
  </script>
</body>
</html>
