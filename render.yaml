services:
  - type: web
    name: travel-advisor
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: TRAVELPAYOUTS_TOKEN
        sync: false
      - key: AMADEUS_CLIENT_ID
        sync: false
      - key: AMADEUS_CLIENT_SECRET
        sync: false
      - key: TEQUILA_API_KEY
        sync: false
